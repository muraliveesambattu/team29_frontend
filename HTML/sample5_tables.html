<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            width: 100%;
        }
        
    </style>
</head>
<body>
    <table border="1">
        <thead>
            <tr>
                <th>Item 1 </th>
                <th>Item 2</th>
                <th>Item 3</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Data 1</td>
                <td>Data 2</td>
                <td>Data 3</td>
            </tr>
            <tr>
                <td>Data 1</td>
                <td>Data 2</td>
                <td>Data 3</td>
            </tr>
            <tr>
                <td colspan="2">I am spreaded to 2 Columns </td>
                <td>Data 3</td>
            </tr>
            <tr>
                <td rowspan="2">I am going Spread 2 Rows</td>
                <td>Data 2</td>
                <td>Data 3</td>
            </tr>
            <tr>
               
                <td>Data 2</td>
                <td>Data 3</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
